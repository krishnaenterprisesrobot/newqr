<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional 3D Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-3d-straight" id="main-card">
        <div id="success-overlay">
            <div class="success-circle">✓</div>
            <h2 class="status-title">Success!</h2>
            <div id="success-amt" class="success-amount">₹0</div>
            <div class="details-table">
                <div class="row"><span>To</span><span id="success-to">Store</span></div>
                <div class="row"><span>ID</span><span id="success-tx">TX12345</span></div>
                <div class="row"><span>Status</span><span class="status-badge">Completed</span></div>
            </div>
        </div>

        <div id="gateway-ui">
            <div class="header-section">
                <div class="live-dot"></div>
                <span>PAYMENT GATEWAY</span>
            </div>
            <div class="amount-wrap">
                <span class="currency">₹</span><span id="a" class="amount-text">0</span>
            </div>
            <div class="qr-vault" id="q">
                <div class="idle-ui">
                    <div class="scanner-line"></div>
                    <p>AWAITING SIGNAL</p>
                </div>
            </div>
            <div class="footer-info">
                <div id="n" class="merchant-name">System Standby</div>
                <div class="encryption-tag">256-BIT ENCRYPTED</div>
            </div>
        </div>
    </div>

    <audio id="upiSound" preload="auto">
        <source src="Sound/Notif.wav" type="audio/wav">
        <source src="https://media.vocaroo.com/mp3/19Eb23AGb2xs" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
